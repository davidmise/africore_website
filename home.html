<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Africore logistics</title>

    <!-- Tailwind + Alpine + Fonts -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-pill {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .hero-overlay {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.3) 80%);
        }

        .hero-card {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .tab-content img {
            transition: opacity 0.25s ease;
        }
    </style>
</head>

<body class="bg-[#f5f5f7] text-[#1e1e2a]">

    <div class="max-w-6xl mx-auto px-6 py-8" x-data="{ 
            activeTab: 'retail',
            tabs: {
                retail: { title: 'Retail & E-commerce', icon: 'fa-store', desc: 'Eco-Supply Transportation supports retailers and e-commerce businesses in building greener last-mile delivery networks.', bullets: ['Zero-emission last-mile delivery using electric and hybrid vehicles.', 'Eco-friendly packaging logistics to reduce waste.', 'Optimized route planning for faster, greener deliveries.', 'Reverse logistics support for sustainable returns management.'] },
                manufacturing: { title: 'Manufacturing', icon: 'fa-industry', desc: 'Streamlining supply chain manufacturing with sustainable solutions.', bullets: ['Just-in-time delivery optimization.', 'Waste reduction in transit.', 'Fleet electrification for factories.'] },
                healthcare: { title: 'Healthcare & Pharma', icon: 'fa-heartbeat', desc: 'Precision logistics for healthcare with temperature-controlled fleets.', bullets: ['Cold-chain integrity monitoring.', 'Emergency medical supply delivery.'] },
                food: { title: 'Food & Beverage', icon: 'fa-utensils', desc: 'Fresh, fast, and sustainable farm-to-table transit.', bullets: ['Temperature-controlled containers.', 'Reducing food miles and emissions.'] },
                tech: { title: 'Technology & Electronics', icon: 'fa-microchip', desc: 'Secure and emission-free delivery for high-value tech goods.', bullets: ['Dedicated secure transport.', 'Sustainable packaging and recycling.'] }
            }
        }">

        <!-- Floating Navigation Pill -->
        <nav class="flex flex-col lg:flex-row items-center justify-between bg-white rounded-full px-6 py-3 nav-pill mb-12">
            <div class="flex items-center gap-2 text-xl font-bold">
                <i class="fa-solid fa-leaf text-black"></i> Mivora<sup class="text-[0.6rem] font-normal text-gray-500">TM</sup>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium mt-4 lg:mt-0">
                <a href="#" class="text-[#8bc34a]">Home</a>
                <a href="#" class="text-gray-600 hover:text-black">About</a>
                <a href="#" class="text-gray-600 hover:text-black">Case studies</a>
                <a href="#" class="text-gray-600 hover:text-black">Blog</a>
            </div>
            <button class="bg-[#8bc34a] text-black text-sm font-medium px-5 py-2 rounded-full mt-4 lg:mt-0 hover:bg-[#7cb342] transition">Contact us</button>
        </nav>

        <!-- Section Header -->
        <div class="mb-6">
            <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">Industries we serve</p>
            <h1 class="text-3xl md:text-4xl font-medium text-[#333333] mt-2 max-w-2xl">Building smarter, cleaner supply chains across diverse industries</h1>
        </div>

        <!-- Tab Buttons -->
        <div class="flex flex-wrap items-center gap-4 mb-10">
            <template x-for="(tab, key) in tabs" :key="key">
                <button @click="activeTab = key" 
                        :class="activeTab === key ? 
                            'border border-dashed border-gray-800 bg-[#f0f0f0] text-black' : 
                            'border border-gray-200 bg-[#f5f5f7] text-gray-500 hover:bg-white'"
                        class="flex items-center gap-3 px-5 py-3 rounded-lg text-sm font-medium transition-all cursor-pointer">
                    <i :class="'fa-solid ' + tab.icon" class="text-base"></i>
                    <span x-text="tab.title"></span>
                </button>
            </template>
        </div>

        <!-- Main Content Card -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col lg:flex-row overflow-hidden gap-8 transition-all">
            
            <!-- Left Image -->
            <div class="w-full lg:w-5/12 h-80 lg:h-auto overflow-hidden rounded-2xl relative">
                <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?q=80&w=1000&auto=format&fit=crop" 
                     alt="Greenhouse farmer" 
                     class="w-full h-full object-cover">
            </div>

            <!-- Right Content -->
            <div class="w-full lg:w-7/12 flex flex-col justify-center p-2 lg:p-4">
                <template x-for="(tab, key) in tabs" :key="key">
                    <div x-show="activeTab === key" x-cloak class="transition-opacity duration-300">
                        <h2 class="text-2xl font-medium text-gray-900 mb-2" x-text="tab.title"></h2>
                        <p class="text-gray-500 text-sm leading-relaxed mb-6 max-w-md" x-text="tab.desc"></p>
                        
                        <ul class="space-y-3">
                            <template x-for="bullet in tab.bullets" :key="bullet">
                                <li class="flex items-start gap-3 text-sm text-gray-700">
                                    <i class="fa-solid fa-star text-gray-600 mt-0.5 w-4 flex-shrink-0"></i>
                                    <span x-text="bullet"></span>
                                </li>
                            </template>
                        </ul>
                    </div>
                </template>
            </div>
        </div>

        <!-- Floating Action Button -->
        <button class="fixed bottom-8 right-8 bg-[#1e1e2f] text-white h-12 w-12 rounded-full flex items-center justify-center shadow-lg hover:bg-black transition">
            <i class="fa-solid fa-star text-sm"></i>
        </button>

    </div>

</body>

</html>
